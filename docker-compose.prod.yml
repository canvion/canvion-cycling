services:
  db:
    image: postgres:15-alpine
    container_name: cycling-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cycling_db
      POSTGRES_USER: cycling_user
      POSTGRES_PASSWORD: cycling_password_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cycling-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cycling_user -d cycling_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cycling-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cycling-network

volumes:
  postgres_data:
    driver: local

networks:
  cycling-network:
    driver: bridge
