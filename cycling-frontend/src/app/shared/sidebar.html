<aside class="sidebar" [class.collapsed]="isCollapsed">

  <div class="sidebar-header">
    <span class="sidebar-logo" *ngIf="!isCollapsed">Canvion</span>
    <button class="toggle-btn" (click)="toggle()">
      {{ isCollapsed ? '→' : '←' }}
    </button>
  </div>

  <nav>
    <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
      <span class="nav-text" *ngIf="!isCollapsed">Dashboard</span>
      <span class="nav-icon" *ngIf="isCollapsed">D</span>
    </a>
    <a routerLink="/activities" routerLinkActive="active" class="nav-item">
      <span class="nav-text" *ngIf="!isCollapsed">Actividades</span>
      <span class="nav-icon" *ngIf="isCollapsed">A</span>
    </a>
    <a routerLink="/calendar" routerLinkActive="active" class="nav-item">
      <span class="nav-text" *ngIf="!isCollapsed">Calendario</span>
      <span class="nav-icon" *ngIf="isCollapsed">C</span>
    </a>
    <a routerLink="/records" routerLinkActive="active" class="nav-item">
      <span class="nav-text" *ngIf="!isCollapsed">Récords</span>
      <span class="nav-icon" *ngIf="isCollapsed">R</span>
    </a>
    <a routerLink="/stats" routerLinkActive="active" class="nav-item">
      <span class="nav-text" *ngIf="!isCollapsed">Estadísticas</span>
      <span class="nav-icon" *ngIf="isCollapsed">E</span>
    </a>
    <a routerLink="/settings" routerLinkActive="active" class="nav-item">
      <span class="nav-text" *ngIf="!isCollapsed">Ajustes</span>
      <span class="nav-icon" *ngIf="isCollapsed">⚙</span>
    </a>
  </nav>

  <div class="sidebar-bottom">
    <span class="sidebar-user" *ngIf="!isCollapsed">{{ username }}</span>
    <button class="btn-logout" (click)="logout()">
      <span *ngIf="!isCollapsed">Salir</span>
      <span *ngIf="isCollapsed">←</span>
    </button>
  </div>

</aside>
