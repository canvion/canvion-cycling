<nav class="bottom-nav">

  <a routerLink="/dashboard" routerLinkActive="active" class="nav-item" (click)="closeMore()">

      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    <span>Inicio</span>
  </a>

  <a routerLink="/activities" routerLinkActive="active" class="nav-item" (click)="closeMore()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
    </svg>
    <span>Actividades</span>
  </a>

  <a routerLink="/calendar" routerLinkActive="active" class="nav-item" (click)="closeMore()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    <span>Calendario</span>
  </a>

  <button class="nav-item" [class.active]="showMore" (click)="toggleMore()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="5" cy="12" r="1.5" fill="currentColor"/>
      <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
      <circle cx="19" cy="12" r="1.5" fill="currentColor"/>
    </svg>
    <span>Más</span>
  </button>

</nav>

<!-- Menú más -->
<div class="more-overlay" *ngIf="showMore" (click)="closeMore()"></div>
<div class="more-menu" *ngIf="showMore">
  <a routerLink="/records" class="more-item" (click)="closeMore()">
    <span>🏆</span> Récords
  </a>
  <a routerLink="/stats" class="more-item" (click)="closeMore()">
    <span>📊</span> Estadísticas
  </a>
  <a routerLink="/settings" class="more-item" (click)="closeMore()">
    <span>⚙️</span> Ajustes
  </a>
  <button class="more-item logout-item" (click)="logout()">
    <span>🚪</span> Cerrar sesión
  </button>
</div>
